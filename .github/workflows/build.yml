name: Build Aplex APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses6 libstdc++6 libgomp1

    - name: Install Buildozer and Kivy
      run: |
        pip install --upgrade pip
        pip install --upgrade buildozer kivy

    - name: Initialize Buildozer
      run: python3 -m buildozer init

    - name: Configure Buildozer Settings
      run: |
        python3 -c "
        import re
        with open('buildozer.spec', 'r') as f: content = f.read()
        content = re.sub(r'^title\s*=\s*.*', 'title = Aplex', content, flags=re.M)
        content = re.sub(r'^requirements\s*=\s*.*', 'requirements = python3,kivy,speechrecognition,requests', content, flags=re.M)
        content = re.sub(r'^#\s*android\.permissions\s*=\s*.*', 'android.permissions = INTERNET,RECORD_AUDIO', content, flags=re.M)
        # Force Buildozer to auto-accept SDK licenses natively
        content = re.sub(r'^#\s*android\.accept_sdk_license\s*=\s*.*', 'android.accept_sdk_license = True', content, flags=re.M)
        with open('buildozer.spec', 'w') as f: f.write(content)
        "

    - name: Compile APK Package
      run: python3 -m buildozer --allow-root android debug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Aplex-Android-APK
        path: bin/*.apk
        
