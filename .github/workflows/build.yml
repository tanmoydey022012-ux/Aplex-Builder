name: Build Aplex APK
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5 libstdc++6 libgomp1 libffi-dev libssl-dev

    - name: Install Python Build Modules
      run: |
        pip install --upgrade pip
        pip install --upgrade buildozer kivy cython==0.29.36 sh

    - name: Compile APK Package
      run: python3 -m buildozer --allow-root android debug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Aplex-Android-APK
        path: bin/*.apk
        
