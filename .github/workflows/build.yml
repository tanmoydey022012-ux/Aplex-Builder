name: Build Aplex APK

on: [push, workflow_dispatch]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Correct Cloud Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev tcl gettext
        sudo apt-get install -y p7zip-full patch unzip xclip xsel ffmpeg
        sudo apt-get install -y python3-pip python3-dev python3-setuptools
        # Force install libtinfo6 instead of the broken libtinfo5
        sudo apt-get install -y libtinfo6 libncurses5
        pip3 install --user --upgrade Cython==0.29.36 buildozer sh

    - name: Compile Standalone APK File
      run: |
        export PATH=$PATH:~/.local/bin
        yes | buildozer android debug

    - name: Upload Finished APK File
      uses: actions/upload-artifact@v4
      with:
        name: Aplex-Android-Package
        path: ./bin/*.apk
